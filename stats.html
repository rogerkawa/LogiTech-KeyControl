<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogiTech</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
    <link rel="stylesheet" href="src/stats.css">
    <script type="module" src="src/script/script.js" defer></script>
    
</head>
<body>
    <header>
        <div class="header">
            <i class="bi-key"></i>
            <div class="txtHeader">
                <h1>LogiTech</h1>
                <span>Sistema de Controle e Agendamento de Chaves</span>
            </div>
        </div>
        <button type="button" class="btn btn-outline-light">Sair</button>
    </header>
    <main>
        <section class="title">
            <i class="bi bi-list-columns-reverse"></i>
            <div>
                <h1>Registro de Retiradas</h1>
                <span>Visualize o registro de chaves retiradas</span>
            </div>
        </section>
        <!-- table -->
        <table class="table-light table-hover">
        <thead>
            <tr>
                <th>ID</th>
                <th>SETOR</th>
                <th>SALA</th>
                <th>RESPONSÁVEL</th>
                <th>TURNO</th>
                <th>HORA DA RETIRADA</th>
                <th>HORA DA ENTREGA</th>
                <th>AÇÕES</th>
            </tr>
        </thead>
        <tbody id="table">
            
        </tbody>
        </table>
        <button class="clear btn btn-outline-danger">Limpar Registros</button>
    </main>
</body>
</html>
